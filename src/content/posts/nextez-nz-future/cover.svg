<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="500" r="200" fill="#e94560" opacity="0.05"/>
  <circle cx="1100" cy="100" r="180" fill="#4facfe" opacity="0.05"/>
  
  <!-- Crosshair elements -->
  <circle cx="300" cy="300" r="60" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3"/>
  <line x1="240" y1="300" x2="360" y2="300" stroke="#e94560" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="240" x2="300" y2="360" stroke="#e94560" stroke-width="2" opacity="0.3"/>
  
  <circle cx="900" cy="350" r="45" fill="none" stroke="#4facfe" stroke-width="2" opacity="0.3"/>
  <line x1="855" y1="350" x2="945" y2="350" stroke="#4facfe" stroke-width="2" opacity="0.3"/>
  <line x1="900" y1="305" x2="900" y2="395" stroke="#4facfe" stroke-width="2" opacity="0.3"/>
  
  <!-- Game controller silhouette -->
  <path d="M550 280 Q600 240 650 280 L680 320 Q700 350 680 380 L650 400 Q600 420 550 400 L520 380 Q500 350 520 320 Z" fill="#e94560" opacity="0.2"/>
  
  <!-- Main title -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">逆战</text>
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0.8">未来展望</text>
  
  <!-- Subtitle -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.6" text-anchor="middle">这款腾讯自研FPS还能走多远？</text>
  
  <!-- Bottom decoration -->
  <rect x="450" y="520" width="300" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- NZ text -->
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="18" fill="#4facfe" text-anchor="middle">NexTez · NZ</text>
</svg>
