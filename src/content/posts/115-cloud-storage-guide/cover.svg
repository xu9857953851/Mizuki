      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Cloud shape 1 -->
  <path d="M200 350 Q180 350 180 330 Q180 310 200 310 Q200 280 240 280 Q260 260 290 280 Q320 260 350 280 Q390 260 410 290 Q440 280 450 310 Q480 310 480 330 Q480 350 450 350 Z" fill="url(#cloud)" opacity="0.3"/>
  
  <!-- Cloud shape 2 -->
  <path d="M600 380 Q580 380 580 360 Q580 340 600 340 Q600 310 640 310 Q660 290 690 310 Q720 290 750 310 Q790 290 810 320 Q840 310 850 340 Q880 340 880 360 Q880 380 850 380 Z" fill="url(#cloud)" opacity="0.4"/>
  
  <!-- Cloud shape 3 -->
  <path d="M850 400 Q830 400 830 380 Q830 360 850 360 Q850 330 890 330 Q910 310 940 330 Q970 310 1000 330 Q1040 310 1060 340 Q1090 330 1100 360 Q1130 360 1130 380 Q1130 400 1100 400 Z" fill="url(#cloud)" opacity="0.2"/>
  
  <!-- 115 logo text -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#4facfe" text-anchor="middle">115</text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="36" fill="#ffffff" text-anchor="middle" opacity="0.8">云存储 · 效率工具</text>
  
