<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="#e94560" opacity="0.1"/>
  <circle cx="1050" cy="530" r="120" fill="#4facfe" opacity="0.1"/>
  <circle cx="900" cy="150" r="50" fill="#00f2fe" opacity="0.08"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  
  <!-- Game icons representation -->
  <rect x="350" y="180" width="100" height="80" rx="8" fill="url(#accent)" opacity="0.8"/>
  <rect x="500" y="180" width="100" height="80" rx="8" fill="#4facfe" opacity="0.8"/>
  <rect x="650" y="180" width="100" height="80" rx="8" fill="#00f2fe" opacity="0.8"/>
  
  <!-- Server icon -->
  <rect x="520" y="320" width="160" height="100" rx="10" fill="#ffffff" opacity="0.1"/>
  <rect x="540" y="340" width="120" height="20" rx="4" fill="#4facfe" opacity="0.6"/>
  <rect x="540" y="370" width="120" height="20" rx="4" fill="#00f2fe" opacity="0.6"/>
  <circle cx="560" cy="350" r="5" fill="#4facfe"/>
  <circle cx="560" cy="380" r="5" fill="#00f2fe"/>
  
  <!-- Main title -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">游戏服务端资源站盘点</text>
  
  <!-- Subtitle -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" opacity="0.7" text-anchor="middle">重温经典 · 架设自己的游戏世界</text>
  
  <!-- Bottom line -->
  <rect x="400" y="580" width="400" height="4" rx="2" fill="url(#accent)"/>
</svg>
