<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#111827"/>
  <text x="60" y="76" fill="#fff" font-size="42" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">接触“一键端”前，先看这份检查清单</text>
  <g font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="28">
    <rect x="70" y="140" width="500" height="470" rx="28" fill="#0f172a" stroke="#334155"/>
    <text x="110" y="195" fill="#fbbf24" font-size="34" font-weight="700">技术侧</text>
    <text x="110" y="255" fill="#e5e7eb">1. 系统版本是否兼容</text>
    <text x="110" y="315" fill="#e5e7eb">2. 数据库是否能正常连接</text>
    <text x="110" y="375" fill="#e5e7eb">3. 登录器与补丁是否对应</text>
    <text x="110" y="435" fill="#e5e7eb">4. 端口、防火墙、路径是否冲突</text>
    <text x="110" y="495" fill="#e5e7eb">5. 压缩包来源是否可信</text>
    <text x="110" y="555" fill="#e5e7eb">6. 是否做好本地隔离测试</text>

    <rect x="630" y="140" width="500" height="470" rx="28" fill="#0f172a" stroke="#334155"/>
    <text x="670" y="195" fill="#fb7185" font-size="34" font-weight="700">风险侧</text>
    <text x="670" y="255" fill="#e5e7eb">1. 版权与合规风险</text>
    <text x="670" y="315" fill="#e5e7eb">2. 木马、后门、捆绑程序风险</text>
    <text x="670" y="375" fill="#e5e7eb">3. 外网开放后的入侵风险</text>
    <text x="670" y="435" fill="#e5e7eb">4. 账号数据泄露风险</text>
    <text x="670" y="495" fill="#e5e7eb">5. 后续维护成本远高于想象</text>
    <text x="670" y="555" fill="#e5e7eb">6. “一键”只是包装，不是免运维</text>
  </g>
</svg>